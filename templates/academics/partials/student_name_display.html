<div id="student-name-field">
    <div class="flex items-center gap-2 group/name">
        <h1 class="text-2xl font-bold text-slate-900">{{ student.full_name }}</h1>
        <button hx-get="{% url 'academics:student_name_edit' student.pk %}"
                hx-target="#student-name-field"
                hx-swap="outerHTML"
                title="Modifier le nom"
                class="opacity-0 group-hover/name:opacity-100 flex h-7 w-7 items-center justify-center rounded-md text-slate-400 hover:bg-slate-100 hover:text-slate-600 transition-all">
            <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125" />
            </svg>
        </button>
    </div>
    {% if error %}
    <p class="mt-1 text-xs text-red-600">{{ error }}</p>
    {% endif %}
</div>
