{% extends "base.html" %}
{% block title %}Élèves — Palmarès{% endblock %}

{% block content %}

<!-- Page header -->
<div class="mb-6 flex flex-wrap items-start justify-between gap-3">
    <div>
        <h1 class="text-2xl font-bold text-slate-900">Élèves</h1>
        <p class="mt-1 text-sm text-slate-500">
            {{ total_count }} élève{{ total_count|pluralize }} enregistré{{ total_count|pluralize }}
        </p>
    </div>
    <a href="{% url 'exports:csv_students' %}{% if query %}?q={{ query }}{% endif %}"
       class="flex items-center gap-2 rounded-lg border border-slate-200 bg-white px-4 py-2 text-sm font-medium text-slate-700 shadow-sm hover:bg-slate-50 transition-colors">
        <svg class="h-4 w-4 text-slate-500" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3" />
        </svg>
        Exporter CSV
    </a>
</div>

<!-- Barre de recherche -->
<div class="mb-5">
    <div class="relative max-w-sm">
        <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3">
            <svg class="h-4 w-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
            </svg>
        </div>
        <input type="search"
               name="q"
               value="{{ query }}"
               placeholder="Rechercher par nom…"
               autocomplete="off"
               class="w-full rounded-lg border border-slate-200 bg-white py-2 pl-9 pr-9 text-sm text-slate-900 placeholder-slate-400 shadow-sm focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20 transition-all"
               hx-get="{% url 'academics:student_list' %}"
               hx-trigger="input changed delay:300ms, search"
               hx-target="#student-container"
               hx-swap="innerHTML"
               hx-push-url="true"
               hx-indicator="#search-indicator">
        <div id="search-indicator" class="htmx-indicator pointer-events-none absolute inset-y-0 right-0 flex items-center pr-3">
            <svg class="h-4 w-4 animate-spin text-blue-500" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
            </svg>
        </div>
    </div>
</div>

<!-- Container principal (remplacé par HTMX) -->
<div id="student-container">
    {% include "academics/partials/student_rows.html" %}
</div>

{% endblock %}
